<app-navbar />

<div class="topics-page">
  <h1>Thèmes</h1>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="48" />
    </div>
  } @else {
    <div class="topics-grid">
      @for (topic of topics(); track topic.id) {
        <mat-card class="topic-card">
          <mat-card-header>
            <mat-card-title>{{ topic.title }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p class="description">{{ topic.description }}</p>
          </mat-card-content>
          <mat-card-actions>
            @if (isSubscribed(topic.id)) {
              <button mat-stroked-button color="warn" (click)="unsubscribe(topic.id)">
                Se désabonner
              </button>
            } @else {
              <button mat-raised-button color="primary" (click)="subscribe(topic.id)">
                S'abonner
              </button>
            }
          </mat-card-actions>
        </mat-card>
      }
    </div>
  }
</div>
