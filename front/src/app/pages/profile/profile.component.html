<app-navbar />

<div class="profile-page">
  <h1 class="page-title">Profil utilisateur</h1>

  @if (loading()) {
    <div class="loading-container">
      <mat-progress-spinner diameter="48" mode="indeterminate" />
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="save()" class="profile-form">

    <div class="input-field">
      <input formControlName="username" placeholder="Nom d'utilisateur" type="text" />
    </div>

    <div class="input-field">
      <input formControlName="email" placeholder="Email" type="email" />
    </div>

    <div class="input-field">
      <input formControlName="password" placeholder="Mot de passe" type="password" />
    </div>

      @if (successMessage()) {
        <p class="success-msg">{{ successMessage() }}</p>
      }

      <button class="save-btn" type="submit" [disabled]="saving()">
        @if (saving()) {
          <mat-progress-spinner diameter="20" mode="indeterminate" />
        } @else {
          Sauvegarder
        }
      </button>

    </form>

    <hr class="section-divider" />

    <section class="subscriptions-section">
      <h2>Abonnements</h2>

      @if ((user()?.subscriptions?.length ?? 0) === 0) {
        <p class="no-subscriptions">Vous n'êtes abonné à aucun thème.</p>
      } @else {
        <div class="subscriptions-grid">
          @for (sub of user()?.subscriptions ?? []; track sub.id) {
            <app-subscription-card
              [title]="sub.topicTitle"
              (unsubscribe)="unsubscribe(sub.id)"
            />
          }
        </div>
      }
    </section>
  }
</div>
