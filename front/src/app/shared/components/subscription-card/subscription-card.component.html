<div class="sub-card">
  <h3 class="sub-title">{{ title() }}</h3>
  @if (description()) {
    <p class="sub-description">{{ description() }}</p>
  }
  <button class="unsub-btn" type="button" (click)="unsubscribe.emit()" [attr.aria-label]="'Se désabonner de ' + title()">
    Se désabonner
  </button>
</div>
