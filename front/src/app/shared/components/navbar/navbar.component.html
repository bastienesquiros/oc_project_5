<mat-toolbar class="navbar" [class.minimal-mode]="minimal()">
  <a [routerLink]="minimal() ? ['/'] : ['/feed']" class="logo-link">
    <img src="assets/logo_p6.png" alt="MDD Logo" class="navbar-logo" />
  </a>

  @if (!minimal()) {
    <nav class="desktop-nav">
      <button class="logout-btn" (click)="logout()">Se déconnecter</button>
      <a [routerLink]="['/feed']" routerLinkActive="active-link" class="nav-link">Articles</a>
      <a [routerLink]="['/topics']" routerLinkActive="active-link" class="nav-link">Thèmes</a>
      <a [routerLink]="['/profile']" routerLinkActive="avatar--active" class="avatar-link" aria-label="Profil">
        <div class="avatar"><mat-icon>person</mat-icon></div>
      </a>
    </nav>

    <button mat-icon-button class="hamburger" (click)="toggleMenu()" aria-label="Menu">
      <mat-icon>menu</mat-icon>
    </button>
  }
</mat-toolbar>

@if (!minimal()) {
  <div class="side-overlay" [class.open]="menuOpen()" (click)="closeMenu()"></div>
  <nav class="side-panel" [class.open]="menuOpen()">
    <button mat-icon-button class="side-close" (click)="closeMenu()">
      <mat-icon>close</mat-icon>
    </button>
    <button class="side-item side-item--logout" (click)="logout(); closeMenu()">Se déconnecter</button>
    <a [routerLink]="['/feed']" routerLinkActive="active-link" class="side-item" (click)="closeMenu()">Articles</a>
    <a [routerLink]="['/topics']" routerLinkActive="active-link" class="side-item" (click)="closeMenu()">Thèmes</a>
    <div class="side-avatar-wrapper">
      <a [routerLink]="['/profile']" routerLinkActive="avatar--active" class="avatar-link" (click)="closeMenu()">
        <div class="avatar"><mat-icon>person</mat-icon></div>
      </a>
    </div>
  </nav>
}
